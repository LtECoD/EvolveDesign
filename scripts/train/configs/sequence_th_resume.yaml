name: train_mask_msa
output: ./output/sequence
pretrained: null
resume: last
strict_loading: false
disable_checkpoint: false
save_top_k: 5
matmul_precision: null
load_confidence_from_trunk: false
load_sequence_from_trunk: true
find_unused_parameters: false
validation_only: false

trainer:
  accelerator: gpu
  devices: -1
  num_nodes: 2
  precision: 32
  gradient_clip_val: 10.0
  max_epochs: 10
  accumulate_grad_batches: 4   # to adjust depending on the number of devices

data:
  datasets:
    - _target_: afgen.training.DatasetConfig
      target_dir: ../boltz_database/rcsb_processed_targets
      msa_dir: ../boltz_database/rcsb_processed_msa
      prob: 1.0
      sampler:
        _target_: afgen.cluster.ClusterSampler
      cropper:
        _target_: afgen.cropper.AFGenCropper
        min_neighborhood: 0
        max_neighborhood: 40
      split: ./scripts/train/assets/validation_ids.txt
  filters:
    - _target_: boltz.data.filter.dynamic.size.SizeFilter
      min_chains: 1
      max_chains: 300
    - _target_: boltz.data.filter.dynamic.date.DateFilter
      date: "2021-09-30"
      ref: released
    - _target_: boltz.data.filter.dynamic.resolution.ResolutionFilter
      resolution: 4.0
  tokenizer:
    _target_: afgen.tokenizer.AFGenTokenizer
    mask_seq: true
    min_seq_mask: 0.1
    max_seq_mask: 1.
    mask_msa: true
    min_msa_mask: 0.1
    max_msa_mask: 1.0
  featurizer:
    _target_: afgen.featurizer.AFGenFeaturizer

  symmetries: ../boltz_database/symmetry.pkl
  max_tokens: 512
  max_atoms: 4608
  max_seqs: 2048
  pad_to_max_tokens: true
  pad_to_max_atoms: true
  pad_to_max_seqs: true
  samples_per_epoch: 100000
  batch_size: 1
  num_workers: 4
  random_seed: 42
  pin_memory: true
  overfit: null
  crop_validation: true
  return_train_symmetries: true   # confidence module requires true, sequence not
  return_val_symmetries: true  # confidence module requires true, sequence not
  train_binder_pocket_conditioned_prop: 0.3
  val_binder_pocket_conditioned_prop: 0.3
  binder_pocket_cutoff: 6.0
  binder_pocket_sampling_geometric_p: 0.3
  min_dist: 2.0
  max_dist: 22.0
  num_bins: 64
  atoms_per_window_queries: 32

model:
  _target_: afgen.model.AFGenModel
  atom_s: 128
  atom_z: 16
  token_s: 384
  token_z: 128
  num_bins: 64
  atom_feature_dim: 389
  atoms_per_window_queries: 32
  atoms_per_window_keys: 128
  compile_pairformer: false
  compile_structure: false
  compile_confidence: false
  compile_sequence: false
  nucleotide_rmsd_weight: 5.0
  ligand_rmsd_weight: 10.0
  ema: true
  ema_decay: 0.999

  embedder_args:
    # no_atom_encoder: false
    atom_encoder_depth: 3
    atom_encoder_heads: 4

  msa_args:
    msa_s: 64
    msa_blocks: 4
    msa_dropout: 0.15
    z_dropout: 0.25
    pairwise_head_width: 32
    pairwise_num_heads: 4
    activation_checkpointing: true
    offload_to_cpu: false

  pairformer_args:
    num_blocks: 48
    num_heads: 16
    dropout: 0.25
    activation_checkpointing: true
    offload_to_cpu: false

  score_model_args:
    sigma_data: 16
    dim_fourier: 256
    atom_encoder_depth: 3
    atom_encoder_heads: 4
    token_transformer_depth: 24
    token_transformer_heads: 16
    atom_decoder_depth: 3
    atom_decoder_heads: 4
    conditioning_transition_layers: 2
    activation_checkpointing: true
    offload_to_cpu: false

  structure_prediction_training: false
  confidence_prediction: false
  alpha_pae: 1
  confidence_imitate_trunk: true
  confidence_model_args:
    num_dist_bins: 64
    max_dist: 22
    add_s_to_z_prod: true
    add_s_input_to_s: true
    use_s_diffusion: true
    add_z_input_to_z: true

    confidence_args:
      num_plddt_bins: 50
      num_pde_bins: 64
      num_pae_bins: 64

  sequence_prediction: true
  sequence_imitate_trunk: true
  sequence_model_args:
    add_s_to_z_prod: true
    add_s_input_to_s: true
    use_s_diffusion: true
    add_z_input_to_z: true

  training_args:
    recycling_steps: 3
    sampling_steps: 200         # 训练confidence或sequence时的sampling steps
    diffusion_multiplicity: 1   # 训练structure module时的multicity
    diffusion_samples: 1        # 训练confidence或sequence时采用的multiplicity
    sequence_loss_weight: 1.0   # 注意 loss weight, 可以改变
    confidence_loss_weight: 3e-3
    diffusion_loss_weight: 4.0
    distogram_loss_weight: 3e-2
    adam_beta_1: 0.9
    adam_beta_2: 0.95
    adam_eps: 0.00000001
    lr_scheduler: af3
    base_lr: 0.0
    max_lr: 0.001               # default 0.0018
    lr_warmup_no_steps: 1000
    lr_start_decay_after_n_steps: 20000
    lr_decay_every_n_steps: 20000
    lr_decay_factor: 0.95
    symmetry_correction: true
    run_confidence_sequentially: false

  validation_args:
    recycling_steps: 3
    sampling_steps: 200
    diffusion_samples: 1
    symmetry_correction: true
    run_confidence_sequentially: false

  diffusion_process_args:
    sigma_min: 0.0004
    sigma_max: 160.0
    sigma_data: 16.0
    rho: 7
    P_mean: -1.2
    P_std: 1.5
    gamma_0: 0.8
    gamma_min: 1.0
    noise_scale: 1.0
    step_scale: 1.0
    coordinate_augmentation: true
    alignment_reverse_diff: true
    synchronize_sigmas: true
    use_inference_model_cache: true

  diffusion_loss_args:
    add_smooth_lddt_loss: true
    nucleotide_loss_weight: 5.0
    ligand_loss_weight: 10.0
